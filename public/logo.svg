<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="100" height="100" rx="16" fill="#6B21A8"/>
  <!-- X con brazos en punta hacia las 4 esquinas -->
  <polygon points="9,9 50,30 91,9 70,50 91,91 50,70 9,91 30,50" fill="white"/>
  <!-- Cuerpo cámara (píldora blanca encima de la X) -->
  <rect x="37" y="21" width="26" height="58" rx="13" fill="white"/>
  <!-- Lente principal (círculo púrpura) -->
  <circle cx="50" cy="38" r="11.5" fill="#6B21A8"/>
  <!-- Reflejo del lente (arco blanco) -->
  <path d="M41,43 A10.5,10.5 0 0,1 45.5,27.5" stroke="white" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- Anillo secundario -->
  <circle cx="50" cy="57" r="6.2" fill="white"/>
  <circle cx="50" cy="57" r="3.5" fill="#6B21A8"/>
  <!-- Dos puntos inferiores -->
  <circle cx="45" cy="69" r="2.2" fill="#6B21A8"/>
  <circle cx="55" cy="69" r="2.2" fill="#6B21A8"/>
</svg>
